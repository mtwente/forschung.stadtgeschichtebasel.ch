# Managed by prek (https://prek.j178.dev/). Run: uv run prek run -a
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.9.5
    hooks:
      - id: prettier
        files: \.(js|css|md|html)$

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check .github/workflows/process_data.py
        language: system
        pass_filenames: false
        types: [python]
